version: "3.8"

services:
  db:
    image: postgres:16
    container_name: nexustal-db
    environment:
      POSTGRES_USER: nexustal
      POSTGRES_PASSWORD: strongdevpass
      POSTGRES_DB: nexustal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexustal -d nexustal"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    container_name: nexustal-cache
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexustal-engine
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9001:9001"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: nexustal
      DB_USER: nexustal
      DB_PASSWORD: strongdevpass
      REDIS_HOST: cache
      REDIS_PORT: "6379"
      INSTALL_MODE: "true"
      NEXUSTAL_HTTP_PORT: "8080"
      NEXUSTAL_WS_PORT: "9001"
    volumes:
      - ./backend/migrations:/opt/nexustal/migrations:ro

volumes:
  pgdata:
