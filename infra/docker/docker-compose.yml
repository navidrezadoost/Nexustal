version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: nexustal-postgres
    environment:
      POSTGRES_DB: nexustal
      POSTGRES_USER: nexustal
      POSTGRES_PASSWORD: nexustal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexustal -d nexustal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: nexustal-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
